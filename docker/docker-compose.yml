# ANTIGRAVITY — Docker Compose for Multi-Container Deployment
# =============================================================
# Usage: docker compose up --build
# Target: NVIDIA Jetson Orin with GPU support

version: '3.8'

services:
  # ─── Full Stack (Main Navigation) ────────────────────────────────────
  antigravity:
    build:
      context: .
      dockerfile: docker/Dockerfile.jetson
    container_name: antigravity_nav
    runtime: nvidia
    privileged: true
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=42
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /dev:/dev
      - ./models:/workspace/models:ro
      - ./maps:/workspace/maps:ro
      - ./logs:/workspace/logs
    devices:
      - /dev/video0:/dev/video0
      - /dev/ttyACM0:/dev/ttyACM0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               source /workspace/install/setup.bash &&
               ros2 launch antigravity_bringup full_stack.launch.py
               use_sim:=false"
    restart: unless-stopped

  # ─── Simulation (SITL Testing) ───────────────────────────────────────
  simulation:
    build:
      context: .
      dockerfile: docker/Dockerfile.jetson
    container_name: antigravity_sim
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=42
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./models:/workspace/models:ro
      - ./maps:/workspace/maps:ro
    profiles:
      - sim
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               source /workspace/install/setup.bash &&
               ros2 launch antigravity_bringup simulation.launch.py"

  # ─── Visualization (RViz2) ──────────────────────────────────────────
  rviz:
    build:
      context: .
      dockerfile: docker/Dockerfile.jetson
    container_name: antigravity_viz
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=42
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    profiles:
      - viz
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               rviz2 -d /workspace/src/antigravity_bringup/rviz/default.rviz"
