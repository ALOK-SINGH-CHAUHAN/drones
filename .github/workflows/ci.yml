name: ANTIGRAVITY CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linters
        run: pip install flake8 mypy numpy
      - name: Flake8 — syntax errors
        run: flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Flake8 — style warnings
        run: flake8 src/ tests/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

  test:
    name: Unit Tests
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install numpy scipy pytest pytest-cov
      - name: Run unit tests
        run: python3 -m pytest tests/unit/ -v --tb=short --junitxml=test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  coverage:
    name: Coverage Report
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install numpy scipy pytest pytest-cov
      - name: Run with coverage
        run: python3 -m pytest tests/unit/ --cov=tests --cov-report=term-missing
